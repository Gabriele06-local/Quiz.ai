[build]
  publish = "public"
  command = "node scripts/generate-supabase-config.mjs"

[build.environment]
  NODE_VERSION = "20"

# Header HTTP per sito statico (nessun backend proprio; le API sono Supabase)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
